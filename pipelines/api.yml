trigger:
  branches:
    include: [main]
  paths:
    include: [src/api/**]

pr:
  paths:
    include: [src/api/**]

variables:
  buildConfiguration: 'Release'
  azureServiceConnection: 'AzureServiceConnection'
  webAppName: 'aisd-$(environment)-api-$(resourceSuffix)'

stages:
  - stage: Build
    displayName: 'Build & Test API'
    jobs:
      - job: BuildAndTest
        displayName: 'dotnet build + test'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET 10'
            inputs:
              packageType: sdk
              version: '10.x'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet restore'
            inputs:
              command: restore
              projects: 'src/api/**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet build'
            inputs:
              command: build
              projects: 'src/api/**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet test'
            inputs:
              command: test
              projects: 'tests/api/**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
            continueOnError: false

          - task: DotNetCoreCLI@2
            displayName: 'dotnet publish'
            inputs:
              command: publish
              projects: 'src/api/**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/api'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish API artifact'
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/api
              artifactName: api-drop

  - stage: Deploy
    displayName: 'Deploy API'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployApi
        displayName: 'Deploy to App Service'
        environment: $(environment)
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: webAppLinux
                    appName: $(webAppName)
                    package: '$(Pipeline.Workspace)/api-drop/**/*.zip'
                    runtimeStack: 'DOTNETCORE|10.0'
