trigger:
  branches:
    include: [main]
  paths:
    include: [src/frontend/**]

pr:
  paths:
    include: [src/frontend/**]

variables:
  azureServiceConnection: 'AzureServiceConnection'
  staticWebAppName: 'aisd-$(environment)-swa-$(resourceSuffix)'
  nodeVersion: '22.x'

stages:
  - stage: Build
    displayName: 'Build Frontend'
    jobs:
      - job: BuildReact
        displayName: 'npm ci + vite build'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: 'Use Node $(nodeVersion)'
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: 'npm ci'
            workingDirectory: src/frontend

          - script: npm run build
            displayName: 'vite build'
            workingDirectory: src/frontend

          - task: PublishBuildArtifacts@1
            displayName: 'Publish frontend dist'
            inputs:
              pathToPublish: src/frontend/dist
              artifactName: frontend-dist

  - stage: Deploy
    displayName: 'Deploy Frontend'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployFrontend
        displayName: 'Deploy to Static Web App'
        environment: $(environment)
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NodeTool@0
                  displayName: 'Use Node $(nodeVersion)'
                  inputs:
                    versionSpec: $(nodeVersion)

                - script: npm install -g @azure/static-web-apps-cli
                  displayName: 'Install SWA CLI'

                - task: AzureCLI@2
                  displayName: 'Get SWA deployment token'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      TOKEN=$(az staticwebapp secrets list \
                        --name $(staticWebAppName) \
                        --query "properties.apiKey" -o tsv)
                      echo "##vso[task.setvariable variable=swaDeployToken;issecret=true]$TOKEN"

                - script: |
                    swa deploy $(Pipeline.Workspace)/frontend-dist \
                      --deployment-token $(swaDeployToken) \
                      --env production
                  displayName: 'Deploy via SWA CLI'
